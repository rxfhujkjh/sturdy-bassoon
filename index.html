
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mom's Marcus</title>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => {
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'activated') {
              window.location.reload();
            }
          });
        });
      });
  }
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, sans-serif;
    background: #f0f4f8;
    color: #1a1a2e;
    font-size: 18px;
  }

  /* ── Top Bar ── */
  header {
    background: #1a1a2e;
    color: white;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header .title {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  header .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  header button {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 16px;
    cursor: pointer;
  }

  header button:active { background: rgba(255,255,255,0.3); }

  /* ── New Month Form ── */
  #new-month-panel {
    display: none;
    background: #2c3e6b;
    padding: 14px 16px;
  }

  #new-month-panel.open { display: block; }

  #new-month-panel .panel-header {
    color: white;
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #new-month-panel .panel-header button {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 22px;
    cursor: pointer;
    padding: 0;
  }

  .new-month-selectors {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .new-month-selectors select {
    flex: 1;
    background: white;
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    padding: 8px 10px;
  }

  .new-acct-input {
    background: white;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }

  .new-acct-input .acct-label {
    font-size: 15px;
    color: #555;
    margin-bottom: 4px;
    font-weight: 600;
  }

  .new-acct-input input {
    width: 100%;
    font-size: 22px;
    padding: 6px 8px;
    border: 2px solid #ddd;
    border-radius: 8px;
    color: #1a1a2e;
  }

  .new-acct-input input:focus {
    border-color: #2c3e6b;
    outline: none;
  }

  .new-acct-input input::-webkit-inner-spin-button,
  .new-acct-input input::-webkit-outer-spin-button { -webkit-appearance: none; }

  #new-month-panel .save-btn {
    width: 100%;
    background: #2ecc71;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 6px;
  }

  /* ── Month Cards ── */
  .cards {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .month-card {
    background: white;
    border-radius: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  .month-card.latest {
    box-shadow: 0 2px 10px rgba(44,62,107,0.18);
    border: 2px solid #2c3e6b;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .card-header:active { background: #f5f5f5; }

  .card-header .month-label {
    font-size: 18px;
    font-weight: bold;
    color: #1a1a2e;
  }

  .card-header .month-total {
    font-size: 22px;
    font-weight: bold;
    color: #2c3e6b;
  }

  .latest .card-header .month-total {
    font-size: 26px;
    color: #2ecc71;
  }

  .card-header .chevron {
    font-size: 18px;
    color: #999;
    margin-left: 10px;
    transition: transform 0.2s;
  }

  .card-header.expanded .chevron { transform: rotate(90deg); }

  /* ── Card Detail ── */
  .card-detail {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid #f0f0f0;
  }

  .card-detail.open { display: block; }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f5f5f5;
    font-size: 18px;
  }

  .detail-row:last-of-type { border-bottom: none; }

  .detail-row .acct-name { color: #555; }
  .detail-row .acct-val  { font-weight: bold; color: #1a1a2e; }
  .detail-row .acct-val.empty { color: #bbb; font-weight: normal; }

  /* Edit mode rows */
  .edit-row {
    padding: 8px 0;
    border-bottom: 1px solid #f5f5f5;
  }

  .edit-row:last-of-type { border-bottom: none; }

  .edit-row .acct-label {
    font-size: 15px;
    color: #555;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .edit-row input {
    width: 100%;
    font-size: 22px;
    padding: 7px 10px;
    border: 2px solid #ddd;
    border-radius: 8px;
    color: #1a1a2e;
  }

  .edit-row input:focus {
    border-color: #2c3e6b;
    outline: none;
  }

  .edit-row input::-webkit-inner-spin-button,
  .edit-row input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .card-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .btn-edit {
    background: none;
    border: 2px solid #2c3e6b;
    color: #2c3e6b;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
  }

  .btn-save-edit {
    background: #2c3e6b;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
  }

  .btn-cancel-edit {
    background: #e0e0e0;
    color: #333;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 16px;
    cursor: pointer;
  }

  .btn-delete {
    background: none;
    border: 2px solid #e74c3c;
    color: #e74c3c;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 16px;
    cursor: pointer;
    margin-left: auto;
  }

  /* ── Settings Modal ── */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    width: 100%;
    max-height: 75vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-size: 20px;
    margin-bottom: 16px;
    color: #1a1a2e;
  }

  .modal-acct-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .modal-acct-row input {
    flex: 1;
    font-size: 18px;
    padding: 9px 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
  }

  .modal-acct-row input:focus {
    border-color: #2c3e6b;
    outline: none;
  }

  .modal-acct-row .del-btn {
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 8px;
    width: 38px; height: 38px;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .modal-add-btn {
    width: 100%;
    background: #f0f4f8;
    color: #2c3e6b;
    border: 2px dashed #2c3e6b;
    border-radius: 10px;
    padding: 12px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 10px;
  }

  .modal-divider {
    border: none;
    border-top: 1px solid #eee;
    margin: 14px 0;
  }

  .modal-backup-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .modal-backup-btn {
    flex: 1;
    background: #f0f4f8;
    border: 2px solid #2c3e6b;
    color: #2c3e6b;
    border-radius: 10px;
    padding: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
  }

  .modal-done-btn {
    width: 100%;
    background: #2c3e6b;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 6px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a2e;
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 16px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 200;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show { opacity: 1; }

  .empty-state {
    text-align: center;
    color: #aaa;
    padding: 40px 20px;
    font-size: 17px;
  }
</style>
</head>
<body>

<!-- Top Bar -->
<header>
  <div class="title">💰 Mom's Marcus</div>
  <div class="header-actions">
    <button onclick="openSettings()">⚙️</button>
    <button onclick="toggleNewMonth()">＋ New Month</button>
  </div>
</header>

<!-- New Month Panel -->
<div id="new-month-panel">
  <div class="panel-header">
    <span>Add New Month</span>
    <button onclick="toggleNewMonth()">✕</button>
  </div>
  <div class="new-month-selectors">
    <select id="newMonthSel"></select>
    <select id="newYearSel"></select>
  </div>
  <div id="newMonthInputs"></div>
  <button class="save-btn" onclick="saveNewMonth()">💾 Save</button>
</div>

<!-- Month Cards -->
<div class="cards" id="cardsContainer">
  <div class="empty-state">No entries yet.<br>Tap <strong>＋ New Month</strong> to begin.</div>
</div>

<!-- Settings Modal -->
<div class="modal-bg" id="modalBg" onclick="maybeCloseModal(event)">
  <div class="modal">
    <h2>⚙️ Settings</h2>
    <div id="modalAcctList"></div>
    <button class="modal-add-btn" onclick="modalAddAccount()">➕ Add Account</button>
    <hr class="modal-divider">
    <div class="modal-backup-row">
      <button class="modal-backup-btn" onclick="saveToFile()">📤 Save to File</button>
      <button class="modal-backup-btn" onclick="loadFromFile()">📥 Load File</button>
    </div>
    <button class="modal-done-btn" onclick="closeSettings()">✓ Done</button>
  </div>
</div>

<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFileLoad(event)">
<div class="toast" id="toast"></div>

<script>
// ── Storage ────────────────────────────────────────────────────────────────
const STORE_KEY = 'momsmartin_v3';

function defaultStore() {
  return { accounts: ['Checking', 'Savings', 'Marcus'], history: {} };
}

function loadStore() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return defaultStore();
}

function persist() {
  localStorage.setItem(STORE_KEY, JSON.stringify(store));
}

let store = loadStore();

// ── Month/Year helpers ─────────────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

function monthLabel(key) {
  const [y, m] = key.split('-');
  return `${MONTHS[parseInt(m)-1]} ${y}`;
}

function fmt(n) {
  return (n || 0).toLocaleString('en-US', { style:'currency', currency:'USD' });
}

function entryTotal(entry) {
  return (entry.balances || []).reduce((s, v) => s + (v || 0), 0);
}

// ── Init ───────────────────────────────────────────────────────────────────
function init() {
  // Populate new-month selectors
  const mSel = document.getElementById('newMonthSel');
  const ySel = document.getElementById('newYearSel');
  MONTHS.forEach((name, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = name;
    mSel.appendChild(o);
  });
  const now = new Date();
  mSel.value = now.getMonth();
  const thisYear = now.getFullYear();
  for (let y = thisYear - 5; y <= thisYear + 1; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    ySel.appendChild(o);
  }
  ySel.value = thisYear;

  renderNewMonthInputs();
  renderCards();
}

// ── New Month Panel ────────────────────────────────────────────────────────
function toggleNewMonth() {
  const panel = document.getElementById('new-month-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) renderNewMonthInputs();
}

function renderNewMonthInputs() {
  const c = document.getElementById('newMonthInputs');
  c.innerHTML = store.accounts.map((name, i) => `
    <div class="new-acct-input">
      <div class="acct-label">${name}</div>
      <input type="number" inputmode="decimal" placeholder="0.00" id="ni_${i}">
    </div>
  `).join('');
}

function saveNewMonth() {
  const m = parseInt(document.getElementById('newMonthSel').value);
  const y = parseInt(document.getElementById('newYearSel').value);
  const key = `${y}-${String(m+1).padStart(2,'0')}`;

  if (store.history[key]) {
    showToast('⚠️ Month already exists — edit it below');
    document.getElementById('new-month-panel').classList.remove('open');
    // scroll to that card
    const el = document.getElementById(`card-${key}`);
    if (el) el.scrollIntoView({ behavior: 'smooth' });
    return;
  }

  const balances = store.accounts.map((_, i) => {
    const el = document.getElementById(`ni_${i}`);
    return el && el.value !== '' ? parseFloat(el.value) || 0 : null;
  });

  store.history[key] = { balances };
  persist();
  document.getElementById('new-month-panel').classList.remove('open');
  renderCards();
  showToast('✓ Saved!');
}

// ── Cards ──────────────────────────────────────────────────────────────────
function renderCards() {
  const c = document.getElementById('cardsContainer');
  const keys = Object.keys(store.history).sort().reverse();

  if (!keys.length) {
    c.innerHTML = '<div class="empty-state">No entries yet.<br>Tap <strong>＋ New Month</strong> to begin.</div>';
    return;
  }

  c.innerHTML = keys.map((key, idx) => buildCard(key, idx === 0)).join('');
}

function buildCard(key, isLatest) {
  const entry  = store.history[key];
  const total  = entryTotal(entry);
  const latest = isLatest ? 'latest' : '';

  const detailRows = store.accounts.map((name, i) => {
    const val = entry.balances[i];
    const display = val != null ? fmt(val) : '—';
    const cls = val != null ? 'acct-val' : 'acct-val empty';
    return `<div class="detail-row">
      <span class="acct-name">${name}</span>
      <span class="${cls}">${display}</span>
    </div>`;
  }).join('');

  // Latest card starts expanded
  const detailOpen = isLatest ? 'open' : '';
  const chevronExp = isLatest ? 'expanded' : '';

  return `
    <div class="month-card ${latest}" id="card-${key}">
      <div class="card-header ${chevronExp}" onclick="toggleCard(this)">
        <div>
          <div class="month-label">${monthLabel(key)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="month-total">${fmt(total)}</span>
          <span class="chevron">▶</span>
        </div>
      </div>
      <div class="card-detail ${detailOpen}" data-key="${key}">
        <div class="detail-rows">${detailRows}</div>
        <div class="card-actions">
          <button class="btn-edit" onclick="startEdit('${key}')">✏️ Edit</button>
          <button class="btn-delete" onclick="deleteMonth('${key}')">🗑</button>
        </div>
      </div>
    </div>`;
}

function toggleCard(header) {
  header.classList.toggle('expanded');
  const detail = header.nextElementSibling;
  detail.classList.toggle('open');
}

// ── Edit ───────────────────────────────────────────────────────────────────
function startEdit(key) {
  const detail = document.querySelector(`.card-detail[data-key="${key}"]`);
  const entry  = store.history[key];

  const editRows = store.accounts.map((name, i) => {
    const val = entry.balances[i];
    return `<div class="edit-row">
      <div class="acct-label">${name}</div>
      <input type="number" inputmode="decimal" placeholder="0.00"
             id="ei_${key}_${i}" value="${val != null ? val : ''}">
    </div>`;
  }).join('');

  detail.querySelector('.detail-rows').innerHTML = editRows;
  detail.querySelector('.card-actions').innerHTML = `
    <button class="btn-save-edit" onclick="saveEdit('${key}')">💾 Save</button>
    <button class="btn-cancel-edit" onclick="cancelEdit('${key}')">Cancel</button>
    <button class="btn-delete" onclick="deleteMonth('${key}')">🗑</button>
  `;
}

function saveEdit(key) {
  const balances = store.accounts.map((_, i) => {
    const el = document.getElementById(`ei_${key}_${i}`);
    return el && el.value !== '' ? parseFloat(el.value) || 0 : null;
  });
  store.history[key] = { balances };
  persist();

  const keys   = Object.keys(store.history).sort().reverse();
  const isLatest = keys[0] === key;
  const card   = document.getElementById(`card-${key}`);
  card.outerHTML = buildCard(key, isLatest);
  showToast('✓ Saved!');
}

function cancelEdit(key) {
  const keys     = Object.keys(store.history).sort().reverse();
  const isLatest = keys[0] === key;
  const card     = document.getElementById(`card-${key}`);
  const newHTML  = buildCard(key, isLatest);
  card.outerHTML = newHTML;
  // re-open detail after cancel
  const newCard   = document.getElementById(`card-${key}`);
  const newHeader = newCard.querySelector('.card-header');
  const newDetail = newCard.querySelector('.card-detail');
  newHeader.classList.add('expanded');
  newDetail.classList.add('open');
}

// ── Delete ─────────────────────────────────────────────────────────────────
function deleteMonth(key) {
  if (!confirm(`Delete ${monthLabel(key)}?`)) return;
  delete store.history[key];
  persist();
  renderCards();
  showToast('🗑 Deleted');
}

// ── Settings Modal ─────────────────────────────────────────────────────────
function openSettings() {
  const list = document.getElementById('modalAcctList');
  list.innerHTML = store.accounts.map((name, i) => `
    <div class="modal-acct-row">
      <input type="text" value="${name}" id="macct_${i}">
      <button class="del-btn" onclick="removeAcct(${i})">✕</button>
    </div>
  `).join('');
  document.getElementById('modalBg').classList.add('open');
}

function removeAcct(i) {
  syncModalNames();
  store.accounts.splice(i, 1);
  persist();
  openSettings();
}

function modalAddAccount() {
  syncModalNames();
  store.accounts.push('New Account');
  persist();
  openSettings();
}

function syncModalNames() {
  store.accounts.forEach((_, i) => {
    const el = document.getElementById(`macct_${i}`);
    if (el) store.accounts[i] = el.value;
  });
}

function closeSettings() {
  syncModalNames();
  persist();
  renderCards();
  document.getElementById('modalBg').classList.remove('open');
}

function maybeCloseModal(e) {
  if (e.target === document.getElementById('modalBg')) closeSettings();
}

// ── Backup ─────────────────────────────────────────────────────────────────
function saveToFile() {
  const blob = new Blob([JSON.stringify(store, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `momsmartin_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 Saved to file');
}

function loadFromFile() {
  document.getElementById('fileInput').click();
}

function handleFileLoad(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      store = JSON.parse(ev.target.result);
      persist();
      renderCards();
      showToast('📥 Loaded!');
    } catch(err) {
      showToast('❌ File error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Toast ──────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Go ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
